<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principis: compactació</title>
    <link rel="icon" href="https://github.githubassets.com/favicons/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Playfair Display', serif;
            line-height: 1.8; 
            max-width: 800px;
            margin: 0 auto;
            padding: 5vh 5vw;
            -webkit-font-smoothing: antialiased;
        }

        h1.blog-header-link {
            font-size: clamp(2rem, 5vw, 3rem); /* Mismo tamaño que index */
            font-weight: 500;
            margin-bottom: 3rem;
            text-align: center;
            letter-spacing: -1px;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 1.5rem;
        }

        h1.blog-header-link a {
            text-decoration: none;
            color: inherit;
        }

        h2.post-title {
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            font-weight: 400;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .post-meta {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 3rem;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .post-meta img.avatar {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 1px solid #eaeaea;
            display: none;
        }

        .post-content {
            font-size: clamp(1.05rem, 2.5vw, 1.25rem);
            text-align: center;
            color: #1a1a1a;
        }

        .post-content p {
            margin-bottom: 2.5rem;
        }

        .music-embed {
            margin-top: 4rem;
            border-top: 1px solid #f0f0f0;
            padding-top: 2.5rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="blog-header-link"><a href="index.html">Principis</a></h1>
    </header>
    
</body>
</html>
